<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FSAE Team Expense Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="brand-container">
            <div class="brand-logo">MR</div>
            <div>
                <h1 class="brand-title">Mechismu Racing Electric</h1>
                <p class="brand-subtitle">FORMULA BHARAT 2027 • MREX-03 FINANCIAL REPORT</p>
            </div>
        </div>
        <div class="header-stats">
            <div class="header-stat-node">
                <span class="stat-label-tiny">Expected Total Cost</span>
                <span class="val-white" id="header-expected-total">₹0</span>
            </div>
            <div class="header-stat-node">
                <span class="stat-label-tiny">Current Funding</span>
                <span class="val-green" id="header-current-funding">₹0</span>
            </div>
            <div class="auth-zone" id="auth-zone"></div>
        </div>
    </header>

    <nav>
        <button onclick="switchTab('overview')" id="tab-overview" class="nav-tab-active">Overview</button>
        <button onclick="switchTab('structures')" id="tab-structures">Structures</button>
        <button onclick="switchTab('steering')" id="tab-steering">Steering & Suspension</button>
        <button onclick="switchTab('safety')" id="tab-safety">Safety Electronics</button>
        <button onclick="switchTab('battery')" id="tab-battery">Battery</button>
        <button onclick="switchTab('other')" id="tab-other">Other</button>
    </nav>

    <main id="view-container">
        <div class="loading-msg">Loading expense data…</div>
    </main>

<script src="index.js"></script>
</body>
</html>
